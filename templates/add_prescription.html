{% extends "base.html" %}
{% block title %}Add Prescription{% endblock %}
{% block content %}
<section class="booking-container surface-card wide-card">
    <div class="section-heading">
        <span class="eyebrow">Prescription</span>
        <h2>{{ 'Edit' if existing_rx else 'Add' }} Prescription</h2>
        <p>For: <strong>{{ apt.patient_name }}</strong> — {{ apt.appointment_date }} at {{ apt.appointment_time }}</p>
    </div>

    <form method="POST" class="auth-form">
        <div class="form-group">
            <label for="medicines">Medicines / Dosage</label>
            <textarea id="medicines" name="medicines" rows="5"
                      placeholder="e.g.&#10;1. Paracetamol 500mg — twice daily after meals&#10;2. Amoxicillin 250mg — three times daily"
                      required>{{ existing_rx.medicines if existing_rx else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="notes">Doctor's Notes / Instructions</label>
            <textarea id="notes" name="notes" rows="4"
                      placeholder="e.g. Rest for 3 days, drink plenty of fluids, follow-up in 1 week">{{ existing_rx.notes if existing_rx else '' }}</textarea>
        </div>
        <div style="display:flex; gap:1rem; flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary">💊 Save Prescription</button>
            <a href="{{ url_for('doctor_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
